<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>永義房屋 成功莊敬店 - 物件明細建檔</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* =========================================
           1. 品牌視覺與全域變數
           ========================================= */
        :root {
            --brand-yellow: #FDB913;
            --brand-green: #008C4A; 
            --brand-red: #D82A29;   
            --brand-dark: #001F5B; 
            --bg-cream: #FFFDF9; 
            --card-radius: 12px;
            --input-radius: 8px;
        }

        * { box-sizing: border-box; font-family: 'PingFang TC', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-cream); 
            background-image: radial-gradient(circle at 20% 0%, rgba(253, 185, 19, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 100%, rgba(0, 140, 74, 0.05) 0%, transparent 50%);
            color: #333; margin: 0; padding: 10px; padding-bottom: 60px; -webkit-font-smoothing: antialiased; 
        }
        .container { max-width: 900px; margin: 0 auto; }

        .header { text-align: center; margin-bottom: 20px; }
        .header img { height: 45px; margin-bottom: 5px; }
        .header h1 { color: var(--brand-green); font-size: 22px; margin: 0; font-weight: 900; letter-spacing: 1px;}

        /* 選單系統 */
        .top-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.6); padding: 8px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);}
        .tab-btn { flex: 1; padding: 12px 0; text-align: center; font-size: 16px; font-weight: 900; color: #777; background: transparent; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #FFF; color: var(--brand-green); box-shadow: 0 4px 10px rgba(0,140,74,0.1); }

        /* 輸入卡片 */
        .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(30px); border-radius: var(--card-radius); padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04); border: 1px solid rgba(255, 255, 255, 1); }
        .card-title { font-size: 18px; font-weight: 900; margin-top: 0; margin-bottom: 15px; color: var(--brand-green); border-bottom: 2px solid rgba(0,0,0,0.05); padding-bottom: 10px; }
        
        .internal-card { border: 2px solid rgba(216, 42, 41, 0.4); background: rgba(255, 240, 240, 0.85); }
        .internal-card .card-title { color: var(--brand-red); border-bottom-color: rgba(216, 42, 41, 0.1); }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 900; margin-bottom: 6px; color: #444; }
        .required::after { content: " *"; color: var(--brand-red); }

        input[type="text"], input[type="number"], input[type="tel"], textarea, select, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #DDD; border-radius: var(--input-radius); font-size: 16px; font-weight: 700; color: #111; background-color: rgba(255,255,255,0.9); box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: var(--brand-green); background-color: #FFF; box-shadow: 0 0 0 4px rgba(0, 140, 74, 0.15); }
        input[readonly] { background-color: #F8F8F8; color: var(--brand-red); cursor: not-allowed; }

        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip-group input[type="radio"], .chip-group input[type="checkbox"] { display: none; }
        .chip-label { padding: 8px 12px; border: 1px solid #DDD; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; background: #FFF; color: #555; transition: all 0.2s;}
        .chip-group input:checked + .chip-label { background: var(--brand-green); color: #FFF; border-color: var(--brand-green); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }
        
        .other-input { display: none; margin-top: 8px; }
        .flex-row { display: flex; gap: 5px; align-items: center; }
        .flex-row input { flex: 1; text-align: center; font-size: 16px; font-weight: 900; color: var(--brand-red); padding: 8px 0;}
        .flex-row label { margin: 0; padding: 0 5px; color: #666; font-size: 14px; font-weight: 900; white-space: nowrap;}
        
        .btn-add { background: rgba(0, 140, 74, 0.05); color: var(--brand-green); border: 1px dashed var(--brand-green); padding: 10px; border-radius: 10px; font-size: 15px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 5px; transition: 0.2s;}
        .dynamic-row { display: flex; gap: 10px; margin-top: 10px; }
        .dynamic-row input { flex: 1; }
        .btn-remove-row { background: none; border: none; color: #CCC; font-size: 20px; cursor: pointer; padding: 0 5px;}
        
        /* 底部按鈕區 */
        .bottom-actions-wrapper { margin-top: 30px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; gap: 12px;}
        .action-row { display: flex; gap: 12px; }
        .btn-action { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; padding: 16px 15px; font-size: 18px; font-weight: 900; color: #333; cursor: pointer; flex: 1; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s; }
        .btn-action:active { transform: scale(0.98); }
        .btn-action.btn-mobile { color: var(--brand-green); border-color: rgba(0,140,74,0.3); }
        .btn-action.btn-pc { color: var(--brand-dark); border-color: rgba(0,31,91,0.3); }
        .btn-action.btn-copy { background: #111; color: #FFF; width: 100%; flex: none; border: none; padding: 18px 15px;}

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; font-size: 22px; font-weight: 900; color: var(--brand-green);}
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid var(--brand-green); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* =========================================
           2. 隱藏輸出排版區 (強制鎖定 直式 A4 1050x1485)
           ========================================= */
        #exportArea {
            position: absolute; left: -9999px; top: 0;
            width: 1050px !important; height: 1485px !important; max-height: 1485px !important;
            background-color: #FAFAFD;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 1) 0%, transparent 60%),
                radial-gradient(circle at 90% 90%, rgba(230, 240, 250, 0.6) 0%, transparent 60%),
                linear-gradient(135deg, #FFFFFF 0%, #F0F4F8 100%);
            padding: 30px 40px; box-sizing: border-box; 
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        .export-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; opacity: 0.03; pointer-events: none; z-index: 1; filter: grayscale(100%); }

        .export-content { 
            position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            padding: 20px 25px; gap: 15px; height: 100%;
        }
        
        .export-header { display: flex; align-items: center; justify-content: center; border-bottom: 2px solid rgba(0,0,0,0.06); padding-bottom: 12px; flex: none; margin-bottom: 5px;}
        .export-header img { height: 45px; margin-right: 15px; }
        .export-header-text { font-size: 30px; font-weight: 900; color: var(--brand-green); letter-spacing: 4px; display: flex; align-items: center; gap: 15px; }
        .export-header-text .sep { color: #CCC; font-weight: 300; }

        /* --- 網格系統 --- */
        .export-body { flex: 1; display: flex; flex-direction: column; gap: 12px; min-height: 0; }
        .export-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex: none; align-items: stretch; }
        .export-row-full { display: flex; flex-direction: column; flex: none; }

        /* --- 完美卡片式視覺 --- */
        .export-card { display: flex; flex-direction: column; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); background: #FFF; border: 2px solid var(--brand-green); overflow: hidden; box-sizing: border-box; }
        .export-card-header { background: var(--brand-green); color: #FFF; padding: 6px 14px; font-size: 18px; font-weight: 900; display: flex; align-items: center; letter-spacing: 1px; flex: none; justify-content: center;}
        .export-card-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; flex: 1; background: rgba(255,255,255,0.9); }
        
        /* 內部雙拼結構 (第三欄、第四欄專用) */
        .split-card-body { display: flex; flex-direction: row; padding: 10px; gap: 15px; flex: 1; background: rgba(255,255,255,0.9);}
        .split-col { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .split-divider { width: 2px; background-color: rgba(0,140,74,0.15); border-radius: 2px; }
        .split-title { text-align: center; font-size: 16px; font-weight: 900; color: var(--brand-dark); margin-bottom: 5px; border-bottom: 1px dashed rgba(0,0,0,0.1); padding-bottom: 4px; }

        /* 第一欄位：案名橫幅專用 */
        .export-title-block { display: flex; align-items: center; background: #FFF; border-radius: 12px; padding: 10px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 2px solid var(--brand-green); }
        .badge-name { background: var(--brand-green); color: #FFF; padding: 5px 14px; border-radius: 8px; font-weight: 900; font-size: 18px; margin-right: 15px; flex: none; letter-spacing: 2px;}
        .val-name-big { font-size: 24px; font-weight: 900; color: var(--brand-dark); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 項目列表 */
        .export-item { display: flex; font-size: 16px; align-items: center; padding: 4px 0; border-bottom: 1px dashed rgba(0,0,0,0.05);}
        .export-item:last-child { border-bottom: none; padding-bottom: 0;}
        .export-key { font-weight: 900; color: #555; width: 85px; flex-shrink: 0; }
        .export-val { font-weight: 900; color: #111; flex: 1; line-height: 1.3;}
        
        /* 專屬質感顏色 */
        .val-price { color: var(--brand-red); font-size: 20px; font-weight: 900; }
        .val-total { color: var(--brand-red); font-size: 18px; font-weight: 900; }
        .val-red { color: var(--brand-red); font-size: 17px; font-weight: 900; }

        /* 介紹文字區 */
        .export-desc { font-size: 16px; font-weight: 900; color: #111; line-height: 1.6; white-space: pre-wrap; flex: 1; overflow: hidden; padding: 5px;}
        
        /* 圖片網格系統 (強制作正方形) */
        .export-image-grid { display: grid; gap: 10px; flex: none; width: 100%; justify-content: center;}
        .export-image-grid.count-1 { grid-template-columns: 180px; }
        .export-image-grid.count-2 { grid-template-columns: 1fr 1fr; } 
        .export-image-box { aspect-ratio: 1 / 1; overflow: hidden; border-radius: 8px; border: 1px solid #EEE; background: #FAFAFA; display: flex; align-items: center; justify-content: center;}
        .export-image-box img { width: 100%; height: 100%; object-fit: cover; }
        .export-image-grid.empty { display: flex; height: 160px; align-items:center; justify-content:center; background: rgba(0,0,0,0.02); border: 2px dashed rgba(0,0,0,0.1); font-size:15px; font-weight:bold; color:#AAA; border-radius: 8px;}

        .export-footer { text-align: center; font-size: 14px; font-weight: 900; color: #888; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.05); margin-top: auto; flex: none;}

        /* Modal 視窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; padding: 20px;}
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div>產圖處理中...</div>

<div class="container">
    <div class="header">
        <img src="logo.png" alt="永義房屋" onerror="this.style.display='none'">
        <h1>成功莊敬店｜物件明細建檔</h1>
    </div>

    <div class="top-tabs">
        <button class="tab-btn active">1. 透天 / 別墅</button>
        <button class="tab-btn" onclick="alert('公寓/大樓表單建置中，敬請期待！')">2. 公寓 / 大樓</button>
        <button class="tab-btn" onclick="alert('農地/建地表單建置中，敬請期待！')">3. 農地 / 建地</button>
    </div>

    <form id="mainFormArea">
        <div class="card">
            <h2 class="card-title">第一欄位：基本資料</h2>
            <div class="grid-2">
                <div class="form-group"><label>類型</label><select id="v_type"><option value="透天/別墅">透天/別墅</option><option value="大樓/公寓">大樓/公寓</option><option value="其他">其他</option></select></div>
            </div>
            <div class="form-group"><label class="required">案名 (海軍藍字體)</label><input type="text" id="v_name" placeholder="例：棒球場旁稀有釋出"></div>
        </div>

        <div class="card">
            <h2 class="card-title">第二欄位：售價與格局</h2>
            <div class="grid-2">
                <div class="form-group"><label class="required">售價 (萬/紅字)</label><input type="text" id="v_price" class="format-num" placeholder="1198"></div>
                <div class="form-group">
                    <label>格局</label>
                    <div class="flex-row">
                        <input type="tel" id="v_lR" maxlength="1"><label>房</label>
                        <input type="tel" id="v_lL" maxlength="1"><label>廳</label>
                        <input type="tel" id="v_lB" maxlength="1"><label>衛</label>
                    </div>
                    <input type="text" id="v_lOther" class="other-input" style="display:block; margin-top:10px;" placeholder="或其他格局 (自行填入)">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>屋齡</label><select id="v_ageSel" onchange="toggle(this, 'v_ageO')"><option value="空白">空白</option><option value="其他">自行填入</option></select><div class="flex-row other-input" id="v_ageO"><input type="tel" id="v_age"><label>年</label></div></div>
                <div class="form-group"><label>建築完成日期</label><select id="v_bDateSel" onchange="toggle(this, 'v_bDateO')"><option value="空白">空白</option><option value="其他">自行填入</option></select><div class="flex-row other-input" id="v_bDateO"><input type="tel" id="v_by"><label>年</label><input type="tel" id="v_bm"><label>月</label><input type="tel" id="v_bd"><label>日</label></div></div>
            </div>
        </div>

        <div class="card" style="border: 2px dashed var(--brand-green); background: rgba(0,140,74,0.02);">
            <h2 class="card-title">第三、四欄位：圖片上傳 (正方形固定尺寸)</h2>
            <div class="form-group">
                <label>請選擇格局圖或實景照 (最多 2 張，將自動裁切為正方形)</label>
                <input type="file" id="v_images" multiple accept="image/*" style="background: #FFF; padding: 10px;">
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">第五欄位：房屋資訊 (地坪)</h2>
            <div class="grid-3">
                <div class="form-group"><label>地坪(肉地)</label><input type="number" id="v_landA" oninput="calcAreas()"></div>
                <div class="form-group"><label>地坪(路地)</label><input type="number" id="v_landRoad" oninput="calcAreas()"></div>
                <div class="form-group"><label style="color:var(--brand-red);">總地坪 (自動加總)</label><input type="text" id="v_totLand" readonly placeholder="肉地+路地"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">第六欄位：房屋資訊 (建坪)</h2>
            <div class="grid-3">
                <div class="form-group"><label>主建物 (坪)</label><input type="number" id="v_mainA" oninput="calcAreas()"></div>
                <div class="form-group"><label>附屬建物 (坪)</label><input type="number" id="v_subA" oninput="calcAreas()"></div>
                <div class="form-group"><label style="color:var(--brand-red);">總建坪 (自動加總)</label><input type="text" id="v_totBuild" readonly placeholder="主建+附屬"></div>
            </div>
            <div class="form-group">
                <label>增建</label>
                <select id="v_addSel" onchange="toggle(this, 'v_addO')"><option value="空白">空白</option><option value="其他">約____幾坪/或其他</option></select>
                <input type="text" id="v_addO" class="other-input" placeholder="例: 約5坪">
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">第七欄位：房屋資訊 (樓層)</h2>
            <div class="grid-2">
                <div class="form-group"><label>樓層</label><div class="flex-row"><label>共</label><input type="text" id="v_fTot"><label>樓</label></div></div>
                <div class="form-group"><label>電梯</label><select id="v_elevSel" onchange="toggle(this,'v_elevO')"><option value="有電梯">有電梯</option><option value="無電梯">無電梯</option><option value="其他">其他</option></select><input type="text" id="v_elevO" class="other-input" placeholder="自行填寫"></div>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>管理費</label><select id="v_mFSel" onchange="toggle(this,'v_mF')"><option value="有管理費">有管理費</option><option value="無管理費">無管理費</option><option value="其他">其他(自行填寫)</option></select><input type="text" id="v_mF" class="other-input" placeholder="自行填入"></div>
                <div class="form-group">
                    <label>管理員上班時間</label>
                    <select id="v_mTS" onchange="toggle(this, 'v_mTO')"><option value="有管理員">有管理員</option><option value="無管理員">無管理員</option><option value="24H">24H</option><option value="早晚">早上__點到晚上__點</option><option value="其他">其他</option></select>
                    <div id="v_mTimeBox" class="other-input flex-row"><label>早</label><input type="text" id="v_mT1"><label>點 到晚</label><input type="text" id="v_mT2"><label>點</label></div>
                    <input type="text" id="v_mTO" class="other-input" placeholder="自行填入">
                </div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">第八欄位：房屋資訊 (尺寸)</h2>
            <div class="grid-4">
                <div class="form-group"><label>一樓樓高 (米)</label><input type="text" id="v_h1" placeholder="填寫米數"></div>
                <div class="form-group"><label>面寬 (米)</label><input type="text" id="v_wS" placeholder="填寫米數"></div>
                <div class="form-group"><label>深度 (米)</label><input type="text" id="v_dpS" placeholder="填寫米數"></div>
                <div class="form-group"><label>路寬 (米)</label><input type="text" id="v_rwS" placeholder="填寫米數"></div>
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">第九欄位：座向</h2>
            <div class="form-group">
                <label>房屋座向</label>
                <select id="v_dH" onchange="toggle(this,'v_dHO')"><option value="空白">空白</option><option value="朝東">朝東</option><option value="朝西">朝西</option><option value="朝南">朝南</option><option value="朝北">朝北</option><option value="朝東南">朝東南</option><option value="朝東北">朝東北</option><option value="朝西南">朝西南</option><option value="朝西北">朝西北</option><option value="其他">其他</option></select>
                <input type="text" id="v_dHO" class="other-input" placeholder="自行填入">
            </div>
        </div>

        <div class="card">
            <h2 class="card-title">第十欄位：車位</h2>
            <div class="grid-3">
                <div class="form-group">
                    <label>汽車位</label>
                    <select id="v_carT" onchange="toggle(this, 'v_carTO')">
                        <option value="無車位">無車位</option><option value="約可停一台">約可停一台</option><option value="約可停兩台">約可停兩台</option><option value="約可停三台">約可停三台</option><option value="約可停四台">約可停四台</option><option value="其他">或其他(自行填入)</option>
                    </select>
                    <input type="text" id="v_carTO" class="other-input" placeholder="請填入">
                </div>
                <div class="form-group">
                    <label>汽車位號碼</label>
                    <select id="v_carNSel" onchange="toggle(this, 'v_carNO')"><option value="無">無</option><option value="其他">位於_層_號</option></select>
                    <div class="flex-row other-input" id="v_carNO" style="margin-bottom:5px;"><label>位於</label><input type="text" id="v_carL"><label>層</label><input type="text" id="v_carN"><label>號</label></div>
                    <input type="text" id="v_carNO2" class="other-input" placeholder="或 其他 (自行填寫)">
                </div>
                <div class="form-group">
